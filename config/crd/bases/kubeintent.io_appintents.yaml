apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: appintents.kubeintent.io
spec:
  group: kubeintent.io
  names:
    kind: AppIntent
    listKind: AppIntentList
    plural: appintents
    singular: appintent
    shortNames: [ai]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [targetRef, policy]
              properties:
                targetRef:
                  type: object
                  required: [apiVersion, kind, name]
                  properties:
                    apiVersion: { type: string }
                    kind: { type: string }
                    name: { type: string }
                runtimeProfileRef:
                  type: string
                policy:
                  type: object
                  properties:
                    availability:
                      type: string
                      enum: [bronze, silver, gold]
                    latencyTargetMs:
                      type: integer
                      minimum: 1
                    maxMonthlyCostUSD:
                      type: number
                      minimum: 0
                    securityTier:
                      type: string
                      enum: [baseline, hardened, strict]
                    autoscaling:
                      type: object
                      properties:
                        enabled: { type: boolean }
                        minReplicas: { type: integer, minimum: 1 }
                        maxReplicas: { type: integer, minimum: 1 }
                        cpuUtilizationTargetPct:
                          type: integer
                          minimum: 1
                          maximum: 100
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, reason, message, lastTransitionTime]
                    properties:
                      type: { type: string }
                      status: { type: string }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Target
          type: string
          jsonPath: .spec.targetRef.name
        - name: Availability
          type: string
          jsonPath: .spec.policy.availability
        - name: Security
          type: string
          jsonPath: .spec.policy.securityTier
