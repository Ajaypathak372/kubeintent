apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: runtimeprofiles.kubeintent.io
spec:
  group: kubeintent.io
  names:
    kind: RuntimeProfile
    listKind: RuntimeProfileList
    plural: runtimeprofiles
    singular: runtimeprofile
    shortNames: [rp]
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                defaults:
                  type: object
                  properties:
                    availability: { type: string, enum: [bronze, silver, gold] }
                    securityTier: { type: string, enum: [baseline, hardened, strict] }
                    autoscaling:
                      type: object
                      properties:
                        enabled: { type: boolean }
                        minReplicas: { type: integer, minimum: 1 }
                        maxReplicas: { type: integer, minimum: 1 }
                        cpuUtilizationTargetPct:
                          type: integer
                          minimum: 1
                          maximum: 100
