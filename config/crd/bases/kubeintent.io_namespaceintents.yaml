apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: namespaceintents.kubeintent.io
spec:
  group: kubeintent.io
  names:
    kind: NamespaceIntent
    listKind: NamespaceIntentList
    plural: namespaceintents
    singular: namespaceintent
    shortNames: [ni]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                priority:
                  type: integer
                policy:
                  type: object
                  properties:
                    availability: { type: string, enum: [bronze, silver, gold] }
                    securityTier: { type: string, enum: [baseline, hardened, strict] }
                    maxMonthlyCostUSD:
                      type: number
                      minimum: 0
                    autoscaling:
                      type: object
                      properties:
                        enabled: { type: boolean }
                        minReplicas: { type: integer, minimum: 1 }
                        maxReplicas: { type: integer, minimum: 1 }
                        cpuUtilizationTargetPct: { type: integer, minimum: 1, maximum: 100 }
